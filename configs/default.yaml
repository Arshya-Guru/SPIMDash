# =============================================================================
# SynthSegSPIM - Configuration
# =============================================================================

# -- Paths --
data:
  label_dir: "/nfs/khan/trainees/apooladi/brainhack/labels"
  image_dir: "/nfs/khan/trainees/apooladi/brainhack/downsampled_lighsheet5"
  output_dir: "./outputs"

  # train/val split
  val_subjects: 10
  random_seed: 42

# -- Volume geometry (from data inspection) --
volume:
  # Shapes vary across subjects (148-272 x 312-392 x 109-226).
  # Median is ~220x316x186. Must be divisible by 32 (2^5 levels).
  # All volumes will be center-padded/cropped to this shape.
  target_shape: [224, 320, 192]
  n_labels: 23   # labels 0..22 (23 total including background)

# -- Synthetic generation --
synth:
  # intensity sampling per label
  intensity_mu_range: [0, 300]
  intensity_sigma_range: [5, 30]

  # augmentation
  bias_field_coeffs: 4
  bias_field_strength: 0.4
  noise_std_range: [0, 25]
  blur_sigma_range: [0, 1.5]

  # spatial deformation
  deform_scale: 3.0
  deform_grid_spacing: 32

  # gamma augmentation
  gamma_range: [0.7, 1.5]

# -- Model (SynthSeg architecture) --
model:
  architecture: "synthseg_unet"
  in_channels: 1
  base_features: 24           # channels: [24, 48, 96, 192, 384]
  # 5 encoder levels, Conv3d->ELU->BatchNorm, no dropout, no residual

# -- Training (plain PyTorch, single GPU, GPU-native synth) --
training:
  epochs: 250
  steps_per_epoch: 500
  batch_size: 2
  lr: 1.0e-4
  optimizer: "adam"
  scheduler: "none"

  # loss
  warmup_steps: 0             # no warmup - Dice+CE from step 0
  loss: "dice_ce"

  # checkpointing
  save_every: 25
  val_every: 3

  # hardware
  amp: true
  gpu: 0                      # which GPU (0 or 1; use other for parallel experiment)
