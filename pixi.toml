[workspace]
channels = ["conda-forge", "pytorch"]
name = "SPIMDash"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.11"
pytorch-cuda = {version = "12.4.*", channel = "pytorch"}
pytorch = {version = ">=2.2", channel = "pytorch"}
torchvision = {channel = "pytorch"}
monai = ">=1.3"
nibabel = ">=5.4.0,<6"
numpy = ">=1.24"
scipy = ">=1.11"
pyyaml = ">=6.0"
pandas = ">=2.0"
matplotlib = ">=3.7"
pytorch-lightning = ">=2.2"
scikit-learn = ">=1.3"
optuna = ">=3.5"

[pypi-dependencies]
nibabel = "*"
